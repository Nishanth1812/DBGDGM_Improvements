# DBGDGM Preprocessing Configuration
# ===================================

# General Settings
general:
  num_threads: 8
  verbose: true
  save_intermediate: false  # Save intermediate processing steps
  quality_check: true

# fMRI Preprocessing Settings
fmri:
  # Input/Output
  output_space: "MNI152"
  output_resolution: 2  # mm
  
  # Preprocessing Steps
  despike: true
  motion_correction: true
  skull_stripping: true
  normalization: true
  smoothing: true
  
  # Motion
  motion_threshold: 3.0  # mm, relative motion threshold
  
  # Smoothing
  smoothing_fwhm: 5.0  # Full Width Half Maximum in mm
  
  # Parcellation
  parcellation_atlas: "schaefer_200"  # Schaefer 200 ROI parcellation
  parcellation_resolution: 2  # mm
  
  # Time Series Extraction
  sliding_window_size: 50  # TRs
  sliding_window_step: 1   # TR
  standardize_timeseries: true
  
  # Temporal Filtering
  high_pass_filter: 0.01  # Hz (100 seconds)
  low_pass_filter: 0.1    # Hz
  
  # Expected TR
  default_tr: 2.0  # seconds (adjust based on your data)

# sMRI Preprocessing Settings
smri:
  # Input/Output
  output_space: "MNI152"
  output_resolution: 1  # mm
  
  # Preprocessing Steps
  skull_stripping: true
  registration: true
  segmentation: true  # FSL or FreeSurfer
  tissue_classification: true
  
  # Tissue Classes
  wm_threshold: 0.5     # White matter probability threshold
  gm_threshold: 0.5     # Gray matter probability threshold
  csf_threshold: 0.5    # CSF probability threshold
  
  # Features to Extract
  features:
    - "wm_volume"        # White matter volume
    - "gm_volume"        # Gray matter volume
    - "csf_volume"       # CSF volume
    - "cortical_thickness"  # Mean cortical thickness
    - "brain_volume"     # Total brain volume
    - "regional_volumes" # Regional GM volumes
  
  # Cortical Thickness (FreeSurfer-compatible)
  cortical_thickness_enabled: true
  
  # Registration method
  registration_method: "SyN"  # ANTs symmetric normalization

# OASIS-Specific Settings
oasis:
  dataset_name: "OASIS-1"
  # 2D images (axial slices, typically T1-weighted)
  image_type: "2d"
  modality: "T1"
  
  # Grouping (important to avoid data leakage!)
  # OASIS has multiple scans per subject - group by real subject
  group_by_subject: true
  use_mni_space_2d: false  # Keep as 2D in native space or convert to 3D
  
  # For 2D → 3D reconstruction
  reconstruct_3d: true   # Reconstruct 3D volume from 2D slices
  
  # Alternative: Process 2D slices individually
  process_2d_slices: false
  slice_normalization: true

# ADNI-Specific Settings
adni:
  dataset_name: "ADNI"
  # DICOM format
  image_type: "3d_dicom"
  
  # DICOM extraction
  anonymize_dicom: true
  extract_series_description: true
  dicom_validation: true
  
  # Series selection (for multi-series DICOM)
  preferred_series:
    - "T1w"
    - "T1"
    - "MPRAGE"
    - "3D SPGR"
  
  # Handle multiple modalities
  auto_select_modality: true
  mod_priority:
    - "fmri"  # rsfMRI for fMRI preprocessing
    - "t1"    # T1 for sMRI preprocessing

# Output Structure
output:
  # Preprocessed data will be organized as:
  # output_root/
  #   ├── dataset_name/
  #   │   ├── fmri/
  #   │   │   ├── sub-01/
  #   │   │   │   ├── ses-01/
  #   │   │   │   │   └── fmri_timeseries.npy  [N_ROI × T]
  #   │   ├── smri/
  #   │   │   ├── sub-01/
  #   │   │   │   ├── ses-01/
  #   │   │   │   │   └── features.npy  [1 × N_features]
  #   │   ├── metadata/
  #   │   │   └── subjects.csv
  
  organize_by_bids: true  # Brain Imaging Data Structure
  compression: "npy"  # or "npz" for compressed
  create_metadata: true

# QC (Quality Control)
qc:
  enabled: true
  max_motion_relative: 3.0  # mm
  max_motion_absolute: 2.0  # mm
  spike_detection: true
  n_dwi_outliers_threshold: 5
  save_qc_reports: true
